<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex 比价</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body
    data-products-url="data/products.json"
    data-meta-url="data/meta.json"
  >
    <main class="page-shell">
      <header class="page-header">
        <div class="content-column">
          <div class="header-line">
            <div>
              <div class="brand-kicker">
                <img class="brand-logo" src="assets/logo.svg" alt="">
                <p class="eyebrow">Codex</p>
              </div>
              <h1>Codex 比价</h1>
            </div>
            <a class="github-link" href="https://github.com/GHSaiMo/codex-price-compare" target="_blank" rel="noopener noreferrer" aria-label="GitHub 项目主页">
              <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                <path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.52 2.87 8.35 6.84 9.71.5.09.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.51.47-3.16-.63-3.36-1.21-.11-.3-.6-1.21-1.03-1.46-.35-.19-.85-.66-.01-.67.79-.01 1.35.74 1.54 1.05.9 1.55 2.34 1.11 2.91.85.09-.67.35-1.11.64-1.37-2.22-.26-4.55-1.14-4.55-5.04 0-1.11.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.95c.85 0 1.71.12 2.51.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.91-2.34 4.78-4.57 5.04.36.32.68.94.68 1.91 0 1.38-.01 2.49-.01 2.83 0 .27.18.59.69.49A10.05 10.05 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"></path>
              </svg>
              <span>GitHub</span>
            </a>
          </div>
          <p class="summary" id="summary">正在读取商品数据...</p>
          <p class="disclaimer">本站仅汇总公开商品信息供参考，不代表对任何店铺或商品质量作出背书。</p>
        </div>
      </header>

      <section class="toolbar" aria-label="商品筛选">
        <div class="content-column filter-panel">
          <div class="toolbar-row toolbar-row-primary">
            <div class="segment" role="tablist" aria-label="一级分类">
              <button class="segment-button is-active" type="button" data-category="all">全部</button>
              <button class="segment-button" type="button" data-category="codex">Codex</button>
              <button class="segment-button" type="button" data-category="plus">仅Plus</button>
              <button class="segment-button" type="button" data-category="sms">接码</button>
            </div>
            <div class="toolbar-tools">
              <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换黑色和淡色系" aria-pressed="false">
                <span class="theme-toggle-track">
                  <span class="theme-toggle-thumb"></span>
                </span>
              </button>
              <a class="toolbar-link" href="sources.html">店铺列表</a>
            </div>
          </div>

          <div class="toolbar-row toolbar-row-secondary">
            <fieldset class="subtype-group">
              <label class="checkbox-pill">
                <input id="subtype-free" type="checkbox" name="subtype" value="free" checked>
                <span>free</span>
              </label>
              <label class="checkbox-pill">
                <input id="subtype-plus" type="checkbox" name="subtype" value="plus" checked>
                <span>plus</span>
              </label>
              <label class="checkbox-pill">
                <input id="subtype-pro" type="checkbox" name="subtype" value="pro" checked>
                <span>pro</span>
              </label>
              <label class="checkbox-pill">
                <input id="subtype-sms" type="checkbox" name="subtype" value="codex_sms" checked>
                <span>接码</span>
              </label>
            </fieldset>

            <div class="filter-actions">
              <div class="filters">
                <label class="field">
                  <span>排序</span>
                  <select id="sortSelect">
                    <option value="price-asc">价格从低到高</option>
                    <option value="price-desc">价格从高到低</option>
                  </select>
                </label>

                <label class="toggle">
                  <input id="includeOutOfStock" type="checkbox" checked>
                  <span>包含缺货</span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="stats content-column" id="stats" aria-live="polite"></section>
      <section class="product-list" id="productList" aria-live="polite"></section>
      <p class="empty-state content-column" id="emptyState" hidden>没有匹配的商品。</p>
    </main>

    <button class="back-to-top" id="backToTop" type="button" aria-label="返回顶部">
      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
        <path d="M12 5 5.5 11.5l1.4 1.4 4.1-4.1V20h2V8.8l4.1 4.1 1.4-1.4L12 5Z"></path>
      </svg>
    </button>

    <script src="app.js"></script>
  </body>
</html>
