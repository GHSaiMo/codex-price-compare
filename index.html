<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Codex 比价</title>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body
    data-products-url="data/products.json"
    data-meta-url="data/meta.json"
  >
    <main class="page-shell">
      <header class="page-header">
        <div class="content-column">
          <div class="header-line">
            <div>
              <div class="brand-kicker">
                <img class="brand-logo" src="assets/logo.svg" alt="">
                <p class="eyebrow">Codex</p>
              </div>
              <div class="title-row">
                <h1>Codex 比价</h1>
                <div class="header-tools">
                  <button class="theme-toggle icon-button" id="themeToggle" type="button" aria-label="切换黑色和淡色系" aria-pressed="false" title="切换黑色和淡色系">
                    <svg class="theme-icon theme-icon-sun" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <circle cx="12" cy="12" r="4"></circle>
                      <path d="M12 2.75v2M12 19.25v2M4.75 12h-2M21.25 12h-2M5.64 5.64 4.22 4.22M19.78 19.78l-1.42-1.42M18.36 5.64l1.42-1.42M4.22 19.78l1.42-1.42"></path>
                    </svg>
                    <svg class="theme-icon theme-icon-moon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M20.6 15.25A8.75 8.75 0 1 1 8.75 3.4 7 7 0 0 0 20.6 15.25Z"></path>
                    </svg>
                  </button>
                  <button class="share-button icon-button" id="shareButton" type="button" aria-label="生成分享截图" title="生成分享截图">
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M18 16.1c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 1 0 15 5c0 .24.04.47.09.7L8.04 9.81A3 3 0 1 0 8.04 14l7.12 4.18c-.05.21-.08.43-.08.65a2.92 2.92 0 1 0 2.92-2.73Z"></path>
                    </svg>
                    <span class="sr-only">分享</span>
                  </button>
                  <a class="toolbar-link icon-button source-icon-link" href="sources.html" aria-label="店铺列表" title="店铺列表">
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M3.75 9.75 5.25 4h13.5l1.5 5.75M4.75 13.25V20h14.5v-6.75M8 20v-4.25h8V20M3.75 9.75a3.15 3.15 0 0 0 5.3 2.25 3.85 3.85 0 0 0 5.9 0 3.15 3.15 0 0 0 5.3-2.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
                    </svg>
                    <span class="sr-only">店铺列表</span>
                  </a>
                  <a class="github-link icon-button" href="https://github.com/GHSaiMo/codex-price-compare" target="_blank" rel="noopener noreferrer" aria-label="GitHub 项目主页" title="GitHub 项目主页">
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.52 2.87 8.35 6.84 9.71.5.09.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.51.47-3.16-.63-3.36-1.21-.11-.3-.6-1.21-1.03-1.46-.35-.19-.85-.66-.01-.67.79-.01 1.35.74 1.54 1.05.9 1.55 2.34 1.11 2.91.85.09-.67.35-1.11.64-1.37-2.22-.26-4.55-1.14-4.55-5.04 0-1.11.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.95c.85 0 1.71.12 2.51.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.91-2.34 4.78-4.57 5.04.36.32.68.94.68 1.91 0 1.38-.01 2.49-.01 2.83 0 .27.18.59.69.49A10.05 10.05 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"></path>
                    </svg>
                    <span class="sr-only">GitHub</span>
                  </a>
                </div>
              </div>
            </div>
          </div>
          <p class="summary" id="summary">正在读取商品数据...</p>
        </div>
      </header>

      <section class="toolbar" aria-label="商品筛选">
        <div class="content-column filter-panel">
          <div class="toolbar-row toolbar-row-filters">
            <fieldset class="subtype-group" aria-label="商品类型">
              <button class="subtype-button" type="button" data-subtype="free" aria-pressed="false">Free</button>
              <button class="subtype-button is-active" type="button" data-subtype="plus" aria-pressed="true">Plus</button>
              <button class="subtype-button" type="button" data-subtype="pro" aria-pressed="false">Pro</button>
              <button class="subtype-button" type="button" data-subtype="codex_sms" aria-pressed="false">SMS</button>
            </fieldset>

            <div class="filter-actions">
              <div class="filters">
                <label class="toggle">
                  <input id="includeOutOfStock" type="checkbox" checked>
                  <span>包含缺货</span>
                </label>
                <button class="sort-button icon-button" id="sortButton" type="button" aria-label="价格升序" title="价格升序">
                  <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                    <path d="M12 4 5.75 10.25l1.42 1.42L11 7.83V20h2V7.83l3.83 3.84 1.42-1.42L12 4Z"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="stats content-column" id="stats" aria-live="polite"></section>
      <section class="product-list" id="productList" aria-live="polite"></section>
      <p class="empty-state content-column" id="emptyState" hidden>没有匹配的商品。</p>
      <footer class="page-footer content-column">
        <p class="disclaimer">本站仅汇总公开商品信息供参考，不代表对任何店铺或商品质量作出背书</p>
        <p class="copyright">&copy; jiuge.space</p>
      </footer>
    </main>

    <button class="back-to-top" id="backToTop" type="button" aria-label="返回顶部">
      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
        <path d="M12 5 5.5 11.5l1.4 1.4 4.1-4.1V20h2V8.8l4.1 4.1 1.4-1.4L12 5Z"></path>
      </svg>
    </button>

    <div class="share-overlay" id="shareOverlay" role="dialog" aria-modal="true" aria-label="分享截图预览" hidden>
      <div class="share-image" id="shareImage">
        <img alt="分享截图">
      </div>
    </div>
    <div class="share-toast" id="shareToast" role="status" aria-live="polite" hidden>正在生成分享图片</div>

    <script src="theme.js"></script>
    <script src="app.js"></script>
  </body>
</html>
